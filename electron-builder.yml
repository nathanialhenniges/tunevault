appId: com.nathanialhenniges.tunevault
productName: TuneVault
directories:
  buildResources: build
  output: dist
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!scripts/*"
  - "!resources/*"
  - "!.github/*"
  - "!electron.vite.config.ts"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**

mac:
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
  identity: null
  gatekeeperAssess: false
  extraResources:
    - from: "resources/bin/mac"
      to: "bin"
      filter:
        - "**/*"

win:
  target:
    - nsis
    - portable
  extraResources:
    - from: "resources/bin/win"
      to: "bin"
      filter:
        - "**/*"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Audio
  extraResources:
    - from: "resources/bin/linux"
      to: "bin"
      filter:
        - "**/*"

publish:
  provider: github
  owner: nathanialhenniges
  repo: tuneVault
  releaseType: release
